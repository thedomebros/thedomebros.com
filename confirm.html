<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex" />
<title>Confirm your measurement | TheDomeBros</title>
<link rel="icon" type="image/png" sizes="512x512" href="/assets/favicon-domebros.png" />
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--cream:#f6f4ef;--card:#fffdf8;--ink:#1f2a37;--mut:#5b6675;--navy:#1f3b73;--navy-d:#162a52;--navy2:#3a5fa8;--line:#e4ddcf;--err:#b3261e}
  *{box-sizing:border-box}html,body{margin:0;overflow-x:hidden}
  body{font-family:Inter,system-ui,-apple-system,sans-serif;background:var(--cream);color:var(--ink);line-height:1.55;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:24px 18px calc(24px + env(safe-area-inset-bottom,0))}
  h1,h2,h3,.brand,.btn{font-family:'Plus Jakarta Sans',Inter,sans-serif;letter-spacing:-.02em}
  .brand{font-weight:800;font-size:22px;color:var(--navy);text-decoration:none;margin:8px 0 22px;display:inline-block}
  .card{width:100%;max-width:440px;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:28px 26px;box-shadow:0 4px 20px rgba(31,42,55,.06)}
  .pill{display:inline-block;background:#e7ecf7;border:1px solid #d4ddf0;color:var(--navy);font-weight:700;font-size:12px;padding:5px 13px;border-radius:999px;margin-bottom:14px}
  h1{font-size:22px;margin:0 0 4px}
  .appt{margin:14px 0 4px;padding:14px 16px;background:#eef1f7;border:1px solid var(--line);border-radius:14px}
  .appt .who{font-weight:700;font-size:17px;font-family:'Plus Jakarta Sans',sans-serif}
  .appt .when{color:var(--navy2);font-weight:600;font-size:15px;margin-top:2px}
  .ask{color:var(--mut);font-size:14px;margin:16px 0 14px}
  .btn{display:block;width:100%;text-align:center;border:0;border-radius:999px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:11px;transition:.15s}
  .btn.confirm{background:var(--navy);color:#fff}.btn.confirm:hover{background:var(--navy-d)}
  .btn.alt{background:#fff;color:var(--navy);border:1.5px solid var(--navy)}.btn.alt:hover{background:#eef1f7}
  .btn.ghost{background:transparent;color:var(--mut);border:1px solid var(--line);font-weight:600}
  textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:13px;font:inherit;font-size:15px;background:#fff;color:var(--ink);resize:vertical;min-height:84px;margin-bottom:11px}
  .prow{display:flex;flex-direction:column;gap:12px;margin-bottom:11px}
  .pl{display:block;font-size:12px;font-weight:700;color:var(--mut);margin-bottom:4px}
  .prow input{display:block;width:100%;max-width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:12px;padding:12px 13px;font:inherit;font-size:15px;background:#fff;color:var(--ink)}
  .sub{display:none}.sub.open{display:block}
  .done{display:none;text-align:center}.done.open{display:block}
  .done .ic{width:64px;height:64px;border-radius:50%;background:var(--navy);color:#fff;font-size:34px;line-height:64px;margin:0 auto 16px}
  .done h2{font-size:22px;margin:0 0 6px}.done p{color:var(--mut);margin:0}
  .err{display:none;color:var(--err);font-size:14px;text-align:center;margin-top:8px}
  .foot{color:var(--mut);font-size:12px;margin-top:18px;text-align:center}
  .foot a{color:var(--navy2)}
</style>
</head>
<body>
  <a class="brand" href="https://thedomebros.com">TheDomeBros</a>
  <div class="card">
    <div id="form">
      <span class="pill" id="typePill">Your appointment</span>
      <h1 id="head">Let's confirm your visit</h1>
      <div class="appt">
        <div class="who" id="who">your measurement</div>
        <div class="when" id="when"></div>
      </div>
      <p class="ask">Tap one below and we'll take it from here:</p>

      <button class="btn confirm" id="btnConfirm">&#10003;&nbsp; Confirm this time</button>

      <button class="btn alt" id="btnResched">Request a different time</button>
      <div class="sub" id="reschedBox">
        <a class="btn confirm" id="btnPickSlot" style="display:none;text-decoration:none" href="#">Pick from our open times</a>
        <p id="pickOr" style="display:none;color:var(--mut);font-size:13px;text-align:center;margin:2px 0 12px">or tell us what generally works:</p>
        <div class="prow">
          <div><label class="pl">Preferred date</label><input id="rDate" type="text" placeholder="Tap to choose a date" /></div>
          <div><label class="pl">Preferred time</label><input id="rTime" type="text" placeholder="Tap to choose a time" /></div>
        </div>
        <textarea id="reschedNote" placeholder="Anything else? (optional)"></textarea>
        <button class="btn confirm" id="btnReschedSend">Send reschedule request</button>
      </div>

      <button class="btn ghost" id="btnCancel">Cancel appointment</button>
      <div class="sub" id="cancelBox">
        <textarea id="cancelNote" placeholder="Anything we should know? (optional)"></textarea>
        <button class="btn confirm" id="btnCancelSend">Confirm cancellation</button>
      </div>

      <div class="err" id="err">Something went wrong &mdash; please text us back instead.</div>
    </div>

    <div class="done" id="done">
      <div class="ic" id="doneIc">&#10003;</div>
      <h2 id="doneTitle">Thanks!</h2>
      <p id="doneMsg"></p>
    </div>
  </div>
  <p class="foot">TheDomeBros &middot; Utah County &middot; <a href="tel:+13852044760">(385) 204-4760</a></p>

<script>
  var WORKER = "https://quote-form.thedomebros-com.workers.dev/confirm";
  var q = new URLSearchParams(location.search);
  var name = (q.get("n") || "").slice(0,120);
  function fromCompact(c){
    if(!c || c.length < 8) return "";
    var dt = new Date(+c.slice(0,4), +c.slice(4,6)-1, +c.slice(6,8));
    var ds = dt.toLocaleDateString(undefined, {weekday:"long", month:"long", day:"numeric"});
    if(c.length >= 12){ var h=+c.slice(8,10), mi=c.slice(10,12); var ap=h>=12?"PM":"AM"; return ds + " at " + (((h+11)%12)+1) + ":" + mi + " " + ap; }
    return ds;
  }
  var when = q.get("d") ? fromCompact(q.get("d")) : (q.get("w") || "").slice(0,120);
  var type = (q.get("t") || "").slice(0,60);
  var eventId = (q.get("e") || "").slice(0,200);
  var NOUNS = { "Measuring":"measurement", "Install":"installation", "Service":"service appointment" };
  var noun = NOUNS[type] || "visit";
  if (type) document.getElementById("typePill").textContent = noun.charAt(0).toUpperCase()+noun.slice(1);
  document.getElementById("head").textContent = "Let's confirm your " + noun;
  if (name) document.getElementById("who").textContent = name;
  document.getElementById("when").textContent = when || "";

  function show(id){ document.getElementById(id).classList.add("open"); }
  function hide(id){ document.getElementById(id).classList.remove("open"); }
  // Reschedule leads with the live slot picker when we know which event this
  // is (the schedule page accepts the same event code); free text stays as the
  // fallback for links minted before the picker existed.
  // Flip SCHED_LIVE to true when the scheduler goes live (calendars shared +
  // SCHED_LIVE=1 on the messaging worker).
  var SCHED_LIVE = false;
  if (SCHED_LIVE && eventId) {
    var ps = document.getElementById("btnPickSlot");
    ps.href = "https://thedomebros.com/schedule?e=" + encodeURIComponent(eventId) + (name ? "&n=" + encodeURIComponent(name) : "");
    ps.style.display = "block";
    document.getElementById("pickOr").style.display = "block";
  }
  document.getElementById("btnResched").onclick = function(){ hide("cancelBox"); show("reschedBox"); if(!eventId) document.getElementById("reschedNote").focus(); };
  document.getElementById("btnCancel").onclick = function(){ hide("reschedBox"); show("cancelBox"); };

  async function send(choice, note, okTitle, okMsg, icon){
    document.getElementById("err").style.display="none";
    try{
      var res = await fetch(WORKER, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ name: name, when: when, type: type, choice: choice, note: note || "", eventId: eventId })
      });
      var out = await res.json();
      if(!res.ok || !out.success) throw new Error();
      document.getElementById("doneIc").innerHTML = icon;
      document.getElementById("doneTitle").textContent = okTitle;
      document.getElementById("doneMsg").textContent = okMsg;
      document.getElementById("form").style.display="none";
      show("done");
    }catch(e){ document.getElementById("err").style.display="block"; }
  }
  document.getElementById("btnConfirm").onclick = function(){
    send("confirmed","", "You're confirmed!", "We'll see you "+(when||"then")+". We'll be in touch if anything changes.", "&#10003;");
  };
  function fmtPref(d, t){
    if(!d) return "";
    var p = d.split("-"); var dt = new Date(+p[0], +p[1]-1, +p[2]);
    var ds = dt.toLocaleDateString(undefined, {weekday:"long", month:"long", day:"numeric"});
    if(!t) return ds;
    var tp = t.split(":"); var h = +tp[0]; var ap = h>=12 ? "PM" : "AM"; var h12 = ((h+11)%12)+1;
    return ds + " at " + h12 + ":" + tp[1] + " " + ap;
  }
  // Field stays a full-width text box; tapping opens the native picker, then it
  // shows a friendly label and stashes the ISO value (so it never overflows).
  function pickerLabel(iso, kind){
    if(kind==="date"){ var p=iso.split("-"); return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"}); }
    var tp=iso.split(":"); var h=+tp[0]; var ap=h>=12?"PM":"AM"; return ((h+11)%12+1)+":"+tp[1]+" "+ap;
  }
  function setupPicker(id, kind){
    var el=document.getElementById(id);
    el.addEventListener("focus", function(){ if(el.type==="text"){ el.type=kind; el.value=el.dataset.iso||""; } });
    el.addEventListener("change", function(){ el.dataset.iso=el.value; });
    el.addEventListener("blur", function(){ el.type="text"; el.value = el.dataset.iso ? pickerLabel(el.dataset.iso, kind) : ""; });
  }
  setupPicker("rDate","date"); setupPicker("rTime","time");
  document.getElementById("btnReschedSend").onclick = function(){
    var pref = fmtPref(document.getElementById("rDate").dataset.iso || "", document.getElementById("rTime").dataset.iso || "");
    var extra = document.getElementById("reschedNote").value.trim();
    if(!pref && !extra){ alert("Pick a preferred date/time (or add a note)."); return; }
    var note = (pref ? "Prefers " + pref : "") + (extra ? ((pref?" — ":"") + extra) : "");
    send("reschedule", note, "Got it", "We got your preferred time — we'll text you to lock it in.", "&#8635;");
  };
  document.getElementById("btnCancelSend").onclick = function(){
    send("canceled", document.getElementById("cancelNote").value, "Cancelled", "Your appointment has been cancelled. Reach out any time if you'd like to rebook.", "&times;");
  };
</script>
</body>
</html>
