<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Contact — TheDomeBros Mockup 8 (Blueprint)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#f6f9fb;--ink:#0e2233;--mut:#5a7385;--brand:#15557a;--accent:#2e86ab;--line:#d2dde4}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans',system-ui,sans-serif;color:var(--ink);line-height:1.65;background:var(--bg);
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:46px 46px;background-position:-1px -1px}
  .mono{font-family:'IBM Plex Mono',monospace;letter-spacing:.04em}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:22px 6vw;border-bottom:1px solid var(--line);background:rgba(246,249,251,.9)}
  .brand{font-weight:700;font-size:20px}
  .nav a.lnk{margin-left:26px;text-decoration:none;color:var(--mut);font-size:13px}
  .nav a.lnk:hover{color:var(--brand)}
  .wrap{max-width:620px;margin:54px auto 80px;padding:0 24px}
  .tagm{color:var(--accent);font-size:12px;border:1px solid var(--line);display:inline-block;padding:6px 12px}
  h1{font-size:clamp(28px,4.4vw,40px);letter-spacing:-.02em;margin:14px 0 8px}
  .sub{color:var(--mut);margin-bottom:30px}
  form{border:1px solid var(--line);background:#fff;padding:34px}
  label{display:block;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent);margin:18px 0 7px}
  input,textarea{width:100%;border:1px solid var(--line);border-radius:0;padding:13px 14px;font:inherit;color:var(--ink);background:#fbfdfe}
  input:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(21,85,122,.12)}
  textarea{min-height:120px;resize:vertical}
  .btn{margin-top:24px;width:100%;background:var(--brand);color:#fff;border:0;font-weight:600;padding:15px;font-size:15px;cursor:pointer}
  .btn:hover{background:#0f3f5a}
  .note{text-align:center;color:var(--mut);font-size:12px;margin-top:16px}
  footer{text-align:center;color:var(--mut);font-size:12px;padding:28px 6vw;border-top:1px solid var(--line)}
</style>
</head>
<body>
  <div class="nav">
    <div class="brand">TheDomeBros</div>
    <div>
      <a class="lnk mono" href="/mockup8">HOME</a>
      <a class="lnk mono" href="/mockup8-contact">CONTACT</a>
      <a class="lnk mono" href="/mockups">ALL MOCKUPS</a>
    </div>
  </div>

  <div class="wrap">
    <div class="tagm mono">GET IN TOUCH</div>
    <h1>Request a quote</h1>
    <p class="sub">Every dome is custom — tell us about your pool and we'll send an estimate.</p>
    <form onsubmit="return false">
      <label>FULL NAME</label><input type="text" placeholder="Your name" />
      <label>EMAIL</label><input type="email" placeholder="you@example.com" />
      <label>PHONE</label><input type="tel" placeholder="(555) 000-0000" />
      <label>APPROX. POOL SIZE (W × L)</label><input type="text" placeholder="e.g. 16 ft x 32 ft" />
      <label>MESSAGE</label><textarea placeholder="Tell us about your pool and deck..."></textarea>
      <button class="btn" type="submit">Send request</button>
      <p class="note">Design mockup — this form is not connected.</p>
    </form>
  </div>

  <footer class="mono">MOCKUP 8 — “BLUEPRINT” · CONCEPT ONLY, NOT THE LIVE SITE</footer>
</body>
</html>
