<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex" />
<title>New confirmation link | TheDomeBros</title>
<link rel="icon" type="image/png" sizes="512x512" href="/assets/favicon-domebros.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--cream:#f6f4ef;--card:#fffdf8;--ink:#1f2a37;--mut:#5b6675;--navy:#1f3b73;--navy-d:#162a52;--navy2:#3a5fa8;--line:#e4ddcf}
  *{box-sizing:border-box}html,body{margin:0}
  body{font-family:Inter,system-ui,-apple-system,sans-serif;background:var(--cream);color:var(--ink);line-height:1.55;min-height:100dvh;padding:24px 18px}
  h1,.brand,.btn,label{font-family:'Plus Jakarta Sans',Inter,sans-serif;letter-spacing:-.02em}
  .wrap{max-width:480px;margin:0 auto}
  .brand{font-weight:800;font-size:20px;color:var(--navy);text-decoration:none}
  h1{font-size:22px;margin:14px 0 2px}
  .note{color:var(--mut);font-size:14px;margin:0 0 18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px}
  label{display:block;font-weight:700;font-size:13px;margin:12px 0 5px}
  input,select{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font:inherit;font-size:16px;background:#fff;color:var(--ink)}
  .row{display:flex;gap:12px}.row>div{flex:1}
  .btn{display:block;width:100%;text-align:center;border:0;border-radius:999px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px;background:var(--navy);color:#fff}
  .btn:hover{background:var(--navy-d)}
  .out{display:none;margin-top:18px}.out.open{display:block}
  .out .lab{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--navy2);margin:14px 0 5px}
  .msg{background:#eef1f7;border:1px solid var(--line);border-radius:12px;padding:13px 14px;font-size:14.5px;white-space:pre-wrap;word-break:break-word}
  .copybtn{margin-top:8px;background:#fff;color:var(--navy);border:1.5px solid var(--navy)}
  .copybtn:hover{background:#eef1f7}
  a.preview{display:inline-block;margin-top:8px;color:var(--navy2);font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <a class="brand" href="/">TheDomeBros</a>
  <h1>New confirmation link</h1>
  <p class="note">Enter the customer and appointment, then copy the ready-to-send text into Google Voice.</p>
  <div class="card">
    <label for="cname">Customer name</label>
    <input id="cname" type="text" placeholder="Mike Thompson" autocomplete="off" />

    <label for="ctype">Appointment type</label>
    <select id="ctype">
      <option value="Measuring">Measuring</option>
      <option value="Install">Install</option>
      <option value="Take down">Take down</option>
      <option value="Put up">Put up</option>
    </select>

    <div class="row">
      <div><label for="cdate">Date</label><input id="cdate" type="date" /></div>
      <div><label for="ctime">Time</label><input id="ctime" type="time" step="900" /></div>
    </div>

    <button class="btn" id="gen">Generate text message</button>

    <div class="out" id="out">
      <div class="lab">Text to send</div>
      <div class="msg" id="msg"></div>
      <button class="btn copybtn" id="copy">Copy message</button>
      <a class="preview" id="preview" target="_blank" rel="noopener">Preview the customer's page &rarr;</a>
    </div>
  </div>
</div>
<script>
  var SITE = location.origin; // https://thedomebros.com
  var NOUNS = { "Measuring":"measurement", "Install":"installation", "Take down":"dome take-down", "Put up":"dome put-up" };
  function firstName(n){ return (n||"").trim().split(/\s+/)[0] || "there"; }
  function fmtWhen(d, t){
    if(!d) return "";
    var p = d.split("-"); var dt = new Date(+p[0], +p[1]-1, +p[2]);
    var ds = dt.toLocaleDateString(undefined, {weekday:"long", month:"long", day:"numeric"});
    if(!t) return ds;
    var tp = t.split(":"); var h = +tp[0]; var ap = h>=12 ? "PM" : "AM"; var h12 = ((h+11)%12)+1;
    return ds + " at " + h12 + ":" + tp[1] + " " + ap;
  }
  document.getElementById("gen").onclick = function(){
    var name = document.getElementById("cname").value.trim();
    var type = document.getElementById("ctype").value;
    var when = fmtWhen(document.getElementById("cdate").value, document.getElementById("ctime").value);
    if(!name || !when){ alert("Enter a name and pick a date (time optional)."); return; }
    var noun = NOUNS[type] || "appointment";
    var link = SITE + "/confirm?n=" + encodeURIComponent(name) + "&w=" + encodeURIComponent(when) + "&t=" + encodeURIComponent(type);
    var msg = "Hi " + firstName(name) + ", this is TheDomeBros confirming your " + noun + " on " + when +
              ". Please confirm or reschedule here: " + link;
    document.getElementById("msg").textContent = msg;
    document.getElementById("preview").href = link;
    document.getElementById("out").classList.add("open");
  };
  document.getElementById("copy").onclick = async function(){
    var msg = document.getElementById("msg").textContent;
    try{ await navigator.clipboard.writeText(msg); this.textContent = "Copied ✓"; }
    catch(e){ var r=document.createRange(); r.selectNodeContents(document.getElementById("msg")); var s=getSelection(); s.removeAllRanges(); s.addRange(r); this.textContent="Selected — press ⌘C"; }
    var b=this; setTimeout(function(){ b.textContent="Copy message"; }, 2500);
  };
</script>
</body>
</html>
