<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Contact — TheDomeBros Mockup 9 (Meridian)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#ffffff;--ink:#111a22;--mut:#5b6b78;--brand:#0a4d8c;--grey:#f2f4f6;--line:#e6e9ec}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6}
  h1,.brand{font-family:'Space Grotesk',sans-serif;letter-spacing:-.02em;line-height:1.05}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:26px 7vw;max-width:1320px;margin:0 auto}
  .brand{font-weight:700;font-size:21px}
  .nav a.lnk{margin-left:30px;text-decoration:none;color:var(--mut);font-size:15px;font-weight:500}
  .nav a.lnk:hover{color:var(--ink)}
  .wrap{max-width:600px;margin:50px auto 90px;padding:0 24px}
  .eyebrow{display:flex;align-items:center;gap:14px;color:var(--mut);font-size:14px;font-weight:500;margin-bottom:18px}
  .eyebrow::before{content:"";width:42px;height:2px;background:var(--brand)}
  h1{font-size:clamp(36px,6vw,58px);font-weight:700;margin-bottom:10px}
  .sub{color:var(--mut);font-size:17px;margin-bottom:36px}
  label{display:block;font-family:'Space Grotesk';font-weight:600;font-size:14px;margin:20px 0 7px}
  input,textarea{width:100%;border:1.5px solid var(--line);border-radius:2px;padding:14px;font:inherit;color:var(--ink);background:var(--grey)}
  input:focus,textarea:focus{outline:none;border-color:var(--brand);background:#fff}
  textarea{min-height:120px;resize:vertical}
  .btn{margin-top:26px;width:100%;background:var(--ink);color:#fff;border:0;font-family:'Space Grotesk';font-weight:600;padding:16px;border-radius:2px;font-size:16px;cursor:pointer}
  .btn:hover{background:var(--brand)}
  .note{text-align:center;color:var(--mut);font-size:13px;margin-top:16px}
  footer{max-width:1320px;margin:0 auto;text-align:center;color:var(--mut);font-size:13px;padding:30px 7vw;border-top:1px solid var(--line)}
</style>
</head>
<body>
  <div class="nav">
    <div class="brand">TheDomeBros</div>
    <div>
      <a class="lnk" href="/mockup9">Home</a>
      <a class="lnk" href="/mockup9-contact">Contact</a>
      <a class="lnk" href="/mockups">All mockups</a>
    </div>
  </div>

  <div class="wrap">
    <div class="eyebrow">Get in touch</div>
    <h1>Request a quote</h1>
    <p class="sub">Every dome is custom — tell us about your pool and we'll send an estimate.</p>
    <form onsubmit="return false">
      <label>Full name</label><input type="text" placeholder="Your name" />
      <label>Email</label><input type="email" placeholder="you@example.com" />
      <label>Phone (optional)</label><input type="tel" placeholder="(555) 000-0000" />
      <label>Approx. pool size (width × length)</label><input type="text" placeholder="e.g. 16 ft x 32 ft" />
      <label>Message</label><textarea placeholder="Tell us about your pool and deck..."></textarea>
      <button class="btn" type="submit">Send request</button>
      <p class="note">Design mockup — this form is not connected.</p>
    </form>
  </div>

  <footer>Mockup 9 — “Meridian” · concept only, not the live site · TheDomeBros</footer>
</body>
</html>
