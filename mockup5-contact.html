<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Contact — TheDomeBros Mockup 5 (Harbor)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--paper:#ffffff;--ink:#142433;--mut:#5d7184;--brand:#1c4e80;--line:#e2e8ee;--soft:#f4f7fa}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Libre Franklin',system-ui,sans-serif;color:var(--ink);background:var(--soft);line-height:1.65}
  .topbar{height:4px;background:var(--brand)}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:24px 7vw;border-bottom:1px solid var(--line);background:#fff}
  .brand{font-weight:700;font-size:20px}
  .nav a.lnk{margin-left:28px;text-decoration:none;color:var(--mut);font-weight:500;font-size:14px;text-transform:uppercase;letter-spacing:.06em}
  .nav a.lnk:hover{color:var(--brand)}
  .wrap{max-width:620px;margin:56px auto 80px;padding:0 24px}
  .kick{color:var(--brand);font-size:13px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;text-align:center;margin-bottom:14px}
  h1{font-size:clamp(30px,4.5vw,42px);text-align:center;letter-spacing:-.02em;margin-bottom:8px}
  .sub{color:var(--mut);text-align:center;margin-bottom:34px}
  form{background:#fff;border:1px solid var(--line);border-radius:6px;padding:36px}
  label{display:block;font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink);margin:18px 0 7px}
  input,textarea{width:100%;border:1px solid var(--line);border-radius:4px;padding:13px 14px;font:inherit;color:var(--ink);background:#fff}
  input:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(28,78,128,.12)}
  textarea{min-height:120px;resize:vertical}
  .btn{margin-top:26px;width:100%;background:var(--brand);color:#fff;border:0;font-weight:600;padding:15px;border-radius:4px;font-size:16px;cursor:pointer}
  .btn:hover{background:#163e66}
  .note{text-align:center;color:var(--mut);font-size:13px;margin-top:16px}
  footer{text-align:center;color:var(--mut);font-size:13px;padding:30px 7vw;border-top:1px solid var(--line)}
</style>
</head>
<body>
  <div class="topbar"></div>
  <div class="nav">
    <div class="brand">TheDomeBros</div>
    <div>
      <a class="lnk" href="/mockup5">Home</a>
      <a class="lnk" href="/mockup5-contact">Contact</a>
      <a class="lnk" href="/mockups">All mockups</a>
    </div>
  </div>

  <div class="wrap">
    <div class="kick">Get in touch</div>
    <h1>Request a quote</h1>
    <p class="sub">Every dome is custom — tell us about your pool and we'll send an estimate.</p>
    <form onsubmit="return false">
      <label>Full name</label><input type="text" placeholder="Your name" />
      <label>Email</label><input type="email" placeholder="you@example.com" />
      <label>Phone (optional)</label><input type="tel" placeholder="(555) 000-0000" />
      <label>Approx. pool size (width × length)</label><input type="text" placeholder="e.g. 16 ft x 32 ft" />
      <label>Message</label><textarea placeholder="Tell us about your pool and deck..."></textarea>
      <button class="btn" type="submit">Send request</button>
      <p class="note">Design mockup — this form is not connected.</p>
    </form>
  </div>

  <footer>Mockup 5 — “Harbor” · concept only, not the live site · TheDomeBros</footer>
</body>
</html>
