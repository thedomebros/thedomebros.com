<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Contact — TheDomeBros Mockup 2 (Deep End)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#06141f;--panel:rgba(255,255,255,.05);--line:rgba(120,200,230,.18);--ink:#e8f3fa;--mut:#8fb2c6;--brand:#33c9e8;--glow:rgba(51,201,232,.35)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.65}
  h1,.brand{font-family:Sora,sans-serif;letter-spacing:-.02em}
  body::before{content:"";position:fixed;inset:0;background:radial-gradient(60% 50% at 70% 0%,rgba(51,201,232,.16),transparent 70%);pointer-events:none}
  .nav,.wrap,footer{position:relative}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:24px 6vw}
  .brand{font-weight:800;font-size:21px}.brand span{color:var(--brand)}
  .nav a.lnk{margin-left:26px;text-decoration:none;color:var(--mut);font-size:15px}
  .nav a.lnk:hover{color:var(--ink)}
  .wrap{max-width:600px;margin:46px auto 80px;padding:0 24px}
  .kick{color:var(--brand);font-weight:600;letter-spacing:.2em;text-transform:uppercase;font-size:12px;text-align:center}
  h1{font-size:clamp(32px,5.5vw,50px);text-align:center;margin:12px 0 8px}
  .sub{color:var(--mut);text-align:center;margin-bottom:32px}
  form{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:34px;backdrop-filter:blur(6px)}
  label{display:block;font-weight:600;font-size:14px;margin:16px 0 6px;color:var(--ink)}
  input,textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:10px;padding:13px 14px;font:inherit;color:var(--ink)}
  input::placeholder,textarea::placeholder{color:#5f8194}
  input:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--glow)}
  textarea{min-height:120px;resize:vertical}
  .btn{margin-top:24px;width:100%;background:var(--brand);color:#04121b;border:0;font-family:Sora;font-weight:600;padding:15px;border-radius:10px;font-size:16px;cursor:pointer}
  .note{text-align:center;color:var(--mut);font-size:13px;margin-top:16px}
  footer{text-align:center;color:var(--mut);font-size:14px;padding:34px 6vw 54px;border-top:1px solid var(--line);margin-top:40px}
</style>
</head>
<body>
  <div class="nav">
    <div class="brand">The<span>Dome</span>Bros</div>
    <div>
      <a class="lnk" href="/mockup2">Home</a>
      <a class="lnk" href="/mockup2-contact">Contact</a>
      <a class="lnk" href="/mockups">All mockups</a>
    </div>
  </div>

  <div class="wrap">
    <div class="kick">Get in touch</div>
    <h1>Request a quote</h1>
    <p class="sub">Every dome is custom — tell us about your pool and we'll send an estimate.</p>
    <form onsubmit="return false">
      <label>Full name</label><input type="text" placeholder="Your name" />
      <label>Email</label><input type="email" placeholder="you@example.com" />
      <label>Phone</label><input type="tel" placeholder="(555) 000-0000" />
      <label>Approx. pool size (width × length)</label><input type="text" placeholder="e.g. 16 ft x 32 ft" />
      <label>Message</label><textarea placeholder="Tell us about your pool and deck..."></textarea>
      <button class="btn" type="submit">Send request</button>
      <p class="note">Design mockup — this form is not connected.</p>
    </form>
  </div>

  <footer>Mockup 2 — “Deep End” · concept only, not the live site · TheDomeBros</footer>
</body>
</html>
