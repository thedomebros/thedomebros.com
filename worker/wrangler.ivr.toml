# Deploy the phone IVR Worker:
#   cd website/worker && npx wrangler deploy -c wrangler.ivr.toml
# Vars/secrets (SALES_CELLS, RESEND_API_KEY, LEAD_TO, MAIL_FROM) stay in the
# Cloudflare dashboard; keep_vars = true stops a deploy from wiping them.
name = "twilio-ivr"
main = "twilio-ivr-worker.js"
compatibility_date = "2026-06-27"
keep_vars = true

# Tracks per-call ring state (agent leg SIDs, caller SID) so that when one team
# member accepts, the other ringing phones are canceled and an all-missed call
# ends cleanly. Created with: npx wrangler kv namespace create CALL_STATE
[[kv_namespaces]]
binding = "CALL_STATE"
id = "7fc153cf34ac4a2d85014b9f777940ae"
