# Deploy the quote-form Worker:
#   cd website/worker && npx wrangler deploy -c wrangler.quote.toml
# Vars/secrets (RESEND_API_KEY, LEAD_TO, MAIL_FROM) stay in the Cloudflare
# dashboard; keep_vars = true stops a deploy from wiping them.
name = "quote-form"
main = "quote-form-worker.js"
compatibility_date = "2026-06-27"
keep_vars = true
