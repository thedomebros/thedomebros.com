<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Contact — TheDomeBros Mockup 4 (Tidewater)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--paper:#f3f1ea;--ink:#26323a;--mut:#5d6f78;--brand:#3a6076;--accent:#7fa9bd;--line:#d8d4c7}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--paper);line-height:1.7}
  h1,.brand{font-family:Fraunces,Georgia,serif;font-weight:600;line-height:1.15}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:30px 7vw;border-bottom:1px solid var(--line)}
  .brand{font-size:22px}
  .nav a.lnk{margin-left:28px;text-decoration:none;color:var(--mut);font-size:15px}
  .nav a.lnk:hover{color:var(--brand)}
  .wrap{max-width:600px;margin:70px auto 90px;padding:0 24px}
  .kick{color:var(--brand);font-size:13px;letter-spacing:.22em;text-transform:uppercase;text-align:center;margin-bottom:14px}
  h1{font-size:clamp(32px,5vw,48px);text-align:center;margin-bottom:10px}
  .sub{color:var(--mut);text-align:center;margin-bottom:38px}
  form{border:1px solid var(--line);background:#fbfaf4;padding:38px}
  label{display:block;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin:18px 0 7px}
  input,textarea{width:100%;border:0;border-bottom:1px solid var(--line);background:transparent;padding:11px 2px;font:inherit;color:var(--ink)}
  input:focus,textarea:focus{outline:none;border-bottom-color:var(--brand)}
  textarea{min-height:110px;resize:vertical}
  .btn{margin-top:28px;width:100%;background:var(--brand);color:var(--paper);border:0;padding:15px;font-family:Fraunces;font-size:16px;letter-spacing:.02em;cursor:pointer}
  .btn:hover{background:#2c4c5e}
  .note{text-align:center;color:var(--mut);font-size:13px;margin-top:16px}
  footer{text-align:center;color:var(--mut);font-size:13px;padding:36px 7vw;border-top:1px solid var(--line)}
</style>
</head>
<body>
  <div class="nav">
    <div class="brand">TheDomeBros</div>
    <div>
      <a class="lnk" href="/mockup4">Home</a>
      <a class="lnk" href="/mockup4-contact">Contact</a>
      <a class="lnk" href="/mockups">All mockups</a>
    </div>
  </div>

  <div class="wrap">
    <div class="kick">Get in touch</div>
    <h1>Request a quote</h1>
    <p class="sub">Every dome is custom — tell us about your pool and we'll send an estimate.</p>
    <form onsubmit="return false">
      <label>Full name</label><input type="text" placeholder="Your name" />
      <label>Email</label><input type="email" placeholder="you@example.com" />
      <label>Phone</label><input type="tel" placeholder="(555) 000-0000" />
      <label>Approx. pool size (width × length)</label><input type="text" placeholder="e.g. 16 ft x 32 ft" />
      <label>Message</label><textarea placeholder="Tell us about your pool and deck..."></textarea>
      <button class="btn" type="submit">Send request</button>
      <p class="note">Design mockup — this form is not connected.</p>
    </form>
  </div>

  <footer>Mockup 4 — “Tidewater” · concept only, not the live site · TheDomeBros</footer>
</body>
</html>
