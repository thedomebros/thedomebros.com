<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Contact — TheDomeBros Mockup 3 (Splash)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#06283d;--mut:#3f6a85;--brand:#0077ff;--brand2:#00d4ff;--soft:#eaf6ff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Manrope,system-ui,sans-serif;color:var(--ink);background:#fff;line-height:1.6}
  h1,.brand{font-family:'Archivo Black',sans-serif;line-height:1.05}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:20px 6vw}
  .brand{font-size:22px;color:var(--brand)}
  .nav a.lnk{margin-left:24px;text-decoration:none;color:var(--ink);font-weight:700;font-size:15px}
  .nav a.lnk:hover{color:var(--brand)}
  .head{background:linear-gradient(125deg,var(--brand),var(--brand2));color:#fff;text-align:center;padding:70px 6vw 110px;clip-path:polygon(0 0,100% 0,100% 78%,0 100%)}
  .tag{display:inline-block;background:rgba(255,255,255,.2);padding:8px 18px;border-radius:999px;font-weight:800;font-size:12px;letter-spacing:.16em;text-transform:uppercase}
  .head h1{font-size:clamp(38px,7vw,64px);margin:18px 0 8px}
  .head p{font-weight:600;opacity:.95}
  .wrap{max-width:580px;margin:-70px auto 80px;padding:0 24px;position:relative}
  form{background:#fff;border:2px solid var(--soft);border-radius:24px;padding:34px;box-shadow:0 30px 60px -30px rgba(0,119,255,.5)}
  label{display:block;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.05em;margin:16px 0 6px}
  input,textarea{width:100%;border:2px solid var(--soft);border-radius:14px;padding:14px;font:inherit;color:var(--ink);background:#fbfdff}
  input:focus,textarea:focus{outline:none;border-color:var(--brand)}
  textarea{min-height:120px;resize:vertical}
  .btn{margin-top:24px;width:100%;background:var(--ink);color:#fff;border:0;font-family:'Archivo Black';padding:17px;border-radius:999px;font-size:16px;cursor:pointer}
  .btn:hover{transform:scale(1.02)}
  .note{text-align:center;color:var(--mut);font-size:13px;margin-top:16px}
  footer{text-align:center;color:var(--mut);font-size:14px;padding:34px 6vw 54px}
</style>
</head>
<body>
  <div class="nav">
    <div class="brand">THEDOMEBROS</div>
    <div>
      <a class="lnk" href="/mockup3">Home</a>
      <a class="lnk" href="/mockup3-contact">Contact</a>
      <a class="lnk" href="/mockups">All mockups</a>
    </div>
  </div>

  <div class="head">
    <span class="tag">Get in touch</span>
    <h1>Request a quote</h1>
    <p>Every dome is custom — tell us about your pool.</p>
  </div>

  <div class="wrap">
    <form onsubmit="return false">
      <label>Full name</label><input type="text" placeholder="Your name" />
      <label>Email</label><input type="email" placeholder="you@example.com" />
      <label>Phone</label><input type="tel" placeholder="(555) 000-0000" />
      <label>Approx. pool size (width × length)</label><input type="text" placeholder="e.g. 16 ft x 32 ft" />
      <label>Message</label><textarea placeholder="Tell us about your pool and deck..."></textarea>
      <button class="btn" type="submit">Send request</button>
      <p class="note">Design mockup — this form is not connected.</p>
    </form>
  </div>

  <footer>Mockup 3 — “Splash” · concept only, not the live site · TheDomeBros</footer>
</body>
</html>
