<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Contact — TheDomeBros Mockup 10 (Lagoon)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--cream:#f6f4ef;--ink:#1d2b2b;--mut:#5c6f6c;--teal:#1f5d5b;--teal2:#3a8f86;--line:#e4ddcf;--card:#fffdf8}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--cream);line-height:1.7}
  h1,.brand{font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:-.02em;line-height:1.15}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:24px 6vw;max-width:1240px;margin:0 auto}
  .brand{font-weight:800;font-size:21px;color:var(--teal)}
  .nav a.lnk{margin-left:26px;text-decoration:none;color:var(--mut);font-weight:600;font-size:15px}
  .nav a.lnk:hover{color:var(--teal)}
  .wrap{max-width:600px;margin:46px auto 80px;padding:0 24px}
  .pill{display:inline-block;background:#fff;border:1px solid var(--line);color:var(--teal);font-weight:700;font-size:13px;padding:7px 16px;border-radius:999px}
  h1{font-size:clamp(32px,5vw,46px);margin:14px 0 8px;text-align:center}
  .pill-wrap{text-align:center}
  .sub{color:var(--mut);text-align:center;margin-bottom:34px}
  form{background:var(--card);border:1px solid var(--line);border-radius:26px;padding:36px}
  label{display:block;font-family:'Plus Jakarta Sans';font-weight:700;font-size:14px;margin:18px 0 7px}
  input,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:14px;font:inherit;color:var(--ink);background:#fff}
  input:focus,textarea:focus{outline:none;border-color:var(--teal2);box-shadow:0 0 0 3px rgba(58,143,134,.18)}
  textarea{min-height:120px;resize:vertical}
  .btn{margin-top:24px;width:100%;background:var(--teal);color:var(--cream);border:0;font-family:'Plus Jakarta Sans';font-weight:700;padding:16px;border-radius:999px;font-size:16px;cursor:pointer}
  .btn:hover{background:#164542}
  .note{text-align:center;color:var(--mut);font-size:13px;margin-top:16px}
  footer{text-align:center;color:var(--mut);font-size:13px;padding:30px 6vw;border-top:1px solid var(--line)}
</style>
</head>
<body>
  <div class="nav">
    <div class="brand">TheDomeBros</div>
    <div>
      <a class="lnk" href="/mockup10">Home</a>
      <a class="lnk" href="/mockup10-contact">Contact</a>
      <a class="lnk" href="/mockups">All mockups</a>
    </div>
  </div>

  <div class="wrap">
    <div class="pill-wrap"><span class="pill">Get in touch</span></div>
    <h1>Request a quote</h1>
    <p class="sub">Every dome is custom — tell us about your pool and we'll send an estimate.</p>
    <form onsubmit="return false">
      <label>Full name</label><input type="text" placeholder="Your name" />
      <label>Email</label><input type="email" placeholder="you@example.com" />
      <label>Phone (optional)</label><input type="tel" placeholder="(555) 000-0000" />
      <label>Approx. pool size (width × length)</label><input type="text" placeholder="e.g. 16 ft x 32 ft" />
      <label>Message</label><textarea placeholder="Tell us about your pool and deck..."></textarea>
      <button class="btn" type="submit">Send request</button>
      <p class="note">Design mockup — this form is not connected.</p>
    </form>
  </div>

  <footer>Mockup 10 — “Lagoon” · concept only, not the live site · TheDomeBros</footer>
</body>
</html>
