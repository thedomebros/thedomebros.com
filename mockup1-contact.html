<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Contact — TheDomeBros Mockup 1 (Clearwater)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#0b2a43;--mut:#5a7184;--brand:#1f8fe0;--brand2:#5ec8f0;--bg:#f4fafe;--line:#dbeaf4}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6}
  h1,.brand{font-family:Poppins,sans-serif}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:22px 6vw;background:rgba(244,250,254,.85);backdrop-filter:blur(8px)}
  .brand{font-weight:800;font-size:20px}.brand span{color:var(--brand)}
  .nav a.lnk{margin-left:26px;text-decoration:none;color:var(--mut);font-weight:500;font-size:15px}
  .nav a.lnk:hover{color:var(--brand)}
  .wrap{max-width:620px;margin:50px auto 80px;padding:0 24px}
  .kick{color:var(--brand);font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-size:13px;text-align:center}
  h1{font-size:clamp(30px,5vw,44px);text-align:center;margin:10px 0 8px;letter-spacing:-.02em}
  .sub{color:var(--mut);text-align:center;margin-bottom:34px}
  form{background:#fff;border:1px solid var(--line);border-radius:20px;padding:34px}
  label{display:block;font-weight:600;font-size:14px;margin:16px 0 6px}
  input,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:13px 14px;font:inherit;color:var(--ink);background:#fbfdff}
  input:focus,textarea:focus{outline:2px solid var(--brand2);border-color:var(--brand)}
  textarea{min-height:120px;resize:vertical}
  .btn{margin-top:24px;width:100%;background:var(--brand);color:#fff;border:0;font-weight:700;padding:15px;border-radius:999px;font-family:Poppins;font-size:16px;cursor:pointer}
  .btn:hover{background:#1573b8}
  .note{text-align:center;color:var(--mut);font-size:13px;margin-top:16px}
  footer{text-align:center;color:var(--mut);font-size:14px;padding:30px 6vw 50px;border-top:1px solid var(--line)}
</style>
</head>
<body>
  <div class="nav">
    <div class="brand">The<span>Dome</span>Bros</div>
    <div>
      <a class="lnk" href="/mockup1">Home</a>
      <a class="lnk" href="/mockup1-contact">Contact</a>
      <a class="lnk" href="/mockups">All mockups</a>
    </div>
  </div>

  <div class="wrap">
    <div class="kick">Get in touch</div>
    <h1>Request a quote</h1>
    <p class="sub">Every dome is custom — tell us about your pool and we'll send an estimate.</p>
    <form onsubmit="return false">
      <label>Full name</label><input type="text" placeholder="Your name" />
      <label>Email</label><input type="email" placeholder="you@example.com" />
      <label>Phone (optional)</label><input type="tel" placeholder="(555) 000-0000" />
      <label>Approx. pool size (width × length)</label><input type="text" placeholder="e.g. 16 ft x 32 ft" />
      <label>Message</label><textarea placeholder="Tell us about your pool and deck..."></textarea>
      <button class="btn" type="submit">Send request</button>
      <p class="note">Design mockup — this form is not connected.</p>
    </form>
  </div>

  <footer>Mockup 1 — “Clearwater” · concept only, not the live site · TheDomeBros</footer>
</body>
</html>
